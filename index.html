<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Museum Gems</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <header class="museum-tabs" aria-label="Museum tabs">
      <button class="tab is-active" type="button">Museum 1</button>
      <button class="tab tab-add" type="button" aria-label="Add museum">+</button>

      <svg class="museum-info-button" id="share-button" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><path d="M371.8 82.4C359.8 87.4 352 99 352 112L352 192L240 192C142.8 192 64 270.8 64 368C64 481.3 145.5 531.9 164.2 542.1C166.7 543.5 169.5 544 172.3 544C183.2 544 192 535.1 192 524.3C192 516.8 187.7 509.9 182.2 504.8C172.8 496 160 478.4 160 448.1C160 395.1 203 352.1 256 352.1L352 352.1L352 432.1C352 445 359.8 456.7 371.8 461.7C383.8 466.7 397.5 463.9 406.7 454.8L566.7 294.8C579.2 282.3 579.2 262 566.7 249.5L406.7 89.5C397.5 80.3 383.8 77.6 371.8 82.6z"/></svg>
    </header>

    <main class="stage-scroll" aria-label="Museum gem display">
      <section class="museum-room">
        <svg class="svg-symbols" aria-hidden="true" focusable="false">
          <symbol id="gem-solid-full" viewBox="0 0 640 640">
            <path
              d="M180.7 97.8C185.2 91.7 192.4 88 200 88L440 88C447.6 88 454.8 91.6 459.3 97.8L571.3 249.8C578.1 259 577.4 271.7 569.8 280.2L337.8 536.2C333.3 541.2 326.8 544.1 320 544.1C313.2 544.1 306.8 541.2 302.2 536.2L70.2 280.2C62.5 271.7 61.9 259 68.7 249.8L180.7 97.8zM219.2 137.6C215.9 140.1 215 144.6 217.1 148.1L274.5 243.8L127.3 256C123.2 256.3 120 259.8 120 264C120 268.2 123.2 271.6 127.3 272L319.3 288C319.7 288 320.2 288 320.6 288L512.6 272C516.7 271.7 519.9 268.2 519.9 264C519.9 259.8 516.7 256.4 512.6 256L365.4 243.7L422.8 148.1C424.9 144.6 424 140 420.7 137.6C417.4 135.2 412.8 135.6 410 138.6L320 236.2L229.9 138.6C227.1 135.6 222.5 135.2 219.2 137.6z"
            />
          </symbol>
        </svg>

        <div class="gem-group gem-row group-top" aria-label="Mythic & Exotic Gems">
          <button class="gem-button gem-mythic" type="button" aria-label="Mythic Gem One" data-gem="mythic-1" data-info="">
            <svg class="gem-icon" aria-hidden="true" focusable="false"><use href="#gem-solid-full"></use></svg>
          </button>
          <button class="gem-button gem-exotic" type="button" aria-label="Exotic Gem One" data-gem="exotic-1" data-info="">
            <svg class="gem-icon" aria-hidden="true" focusable="false"><use href="#gem-solid-full"></use></svg>
          </button>
          <button class="gem-button gem-mythic" type="button" aria-label="Mythic Gem Two" data-gem="mythic-2" data-info="">
            <svg class="gem-icon" aria-hidden="true" focusable="false"><use href="#gem-solid-full"></use></svg>
          </button>
        </div>

        <div class="gem-group gem-column group-left-common" aria-label="Common Gems">
          <button class="gem-button gem-common" type="button" aria-label="Common Gem One" data-gem="common-1" data-info="">
            <svg class="gem-icon" aria-hidden="true" focusable="false"><use href="#gem-solid-full"></use></svg>
          </button>
          <button class="gem-button gem-common" type="button" aria-label="Common Gem Two" data-gem="common-2" data-info="">
            <svg class="gem-icon" aria-hidden="true" focusable="false"><use href="#gem-solid-full"></use></svg>
          </button>
          <button class="gem-button gem-common" type="button" aria-label="Common Gem Three" data-gem="common-3" data-info="">
            <svg class="gem-icon" aria-hidden="true" focusable="false"><use href="#gem-solid-full"></use></svg>
          </button>
        </div>

        <div class="gem-group gem-column group-left-uncommon" aria-label="Uncommon Gems">
          <button class="gem-button gem-uncommon" type="button" aria-label="Uncommon Gem One" data-gem="uncommon-1" data-info="">
            <svg class="gem-icon" aria-hidden="true" focusable="false"><use href="#gem-solid-full"></use></svg>
          </button>
          <button class="gem-button gem-uncommon" type="button" aria-label="Uncommon Gem Two" data-gem="uncommon-2" data-info="">
            <svg class="gem-icon" aria-hidden="true" focusable="false"><use href="#gem-solid-full"></use></svg>
          </button>
          <button class="gem-button gem-uncommon" type="button" aria-label="Uncommon Gem Three" data-gem="uncommon-3" data-info="">
            <svg class="gem-icon" aria-hidden="true" focusable="false"><use href="#gem-solid-full"></use></svg>
          </button>
        </div>

        <div class="gem-group gem-row group-center-legendary" aria-label="Legendary Gems">
          <button class="gem-button gem-legendary" type="button" aria-label="Legendary Gem One" data-gem="legendary-1" data-info="">
            <svg class="gem-icon" aria-hidden="true" focusable="false"><use href="#gem-solid-full"></use></svg>
          </button>
          <button class="gem-button gem-legendary" type="button" aria-label="Legendary Gem Two" data-gem="legendary-2" data-info="">
            <svg class="gem-icon" aria-hidden="true" focusable="false"><use href="#gem-solid-full"></use></svg>
          </button>
          <button class="gem-button gem-legendary" type="button" aria-label="Legendary Gem Three" data-gem="legendary-3" data-info="">
            <svg class="gem-icon" aria-hidden="true" focusable="false"><use href="#gem-solid-full"></use></svg>
          </button>
        </div>

        <div class="gem-group gem-column group-right-epic" aria-label="Epic Gems">
          <button class="gem-button gem-epic" type="button" aria-label="Epic Gem One" data-gem="epic-1" data-info="">
            <svg class="gem-icon" aria-hidden="true" focusable="false"><use href="#gem-solid-full"></use></svg>
          </button>
          <button class="gem-button gem-epic" type="button" aria-label="Epic Gem Two" data-gem="epic-2" data-info="">
            <svg class="gem-icon" aria-hidden="true" focusable="false"><use href="#gem-solid-full"></use></svg>
          </button>
          <button class="gem-button gem-epic" type="button" aria-label="Epic Gem Three" data-gem="epic-3" data-info="">
            <svg class="gem-icon" aria-hidden="true" focusable="false"><use href="#gem-solid-full"></use></svg>
          </button>
        </div>

        <div class="gem-group gem-column group-right-rare" aria-label="Rare Gems">
          <button class="gem-button gem-rare" type="button" aria-label="Rare Gem One" data-gem="rare-1" data-info="">
            <svg class="gem-icon" aria-hidden="true" focusable="false"><use href="#gem-solid-full"></use></svg>
          </button>
          <button class="gem-button gem-rare" type="button" aria-label="Rare Gem Two" data-gem="rare-2" data-info="">
            <svg class="gem-icon" aria-hidden="true" focusable="false"><use href="#gem-solid-full"></use></svg>
          </button>
          <button class="gem-button gem-rare" type="button" aria-label="Rare Gem One" data-gem="rare-3" data-info="">
            <svg class="gem-icon" aria-hidden="true" focusable="false"><use href="#gem-solid-full"></use></svg>
          </button>
        </div>

        <aside class="museum-info" id="museum-info" aria-live="polite">
          <p id="notice-warning" data-info="">NOTICE</p>
          <header id="museum-info-header">
            <p id="museum-info-name">MUSEUM_NAME</p>
            <div id="museum-info-buttons">
              <svg class="museum-info-button" id="edit-button" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><path d="M100.4 417.2C104.5 402.6 112.2 389.3 123 378.5L304.2 197.3L338.1 163.4C354.7 180 389.4 214.7 442.1 267.4L476 301.3L442.1 335.2L260.9 516.4C250.2 527.1 236.8 534.9 222.2 539L94.4 574.6C86.1 576.9 77.1 574.6 71 568.4C64.9 562.2 62.6 553.3 64.9 545L100.4 417.2zM156 413.5C151.6 418.2 148.4 423.9 146.7 430.1L122.6 517L209.5 492.9C215.9 491.1 221.7 487.8 226.5 483.2L155.9 413.5zM510 267.4C493.4 250.8 458.7 216.1 406 163.4L372 129.5C398.5 103 413.4 88.1 416.9 84.6C430.4 71 448.8 63.4 468 63.4C487.2 63.4 505.6 71 519.1 84.6L554.8 120.3C568.4 133.9 576 152.3 576 171.4C576 190.5 568.4 209 554.8 222.5C551.3 226 536.4 240.9 509.9 267.4z"/></svg>
            </div>
          </header>
          <section id="museum-info-stats"></section>
        </aside>
      </section>
    </main>

    <footer class="museum-footer" aria-label="Museum footer">
      <p>Made with ❤️ • In the 🇺🇸 • Is <a class="footer-link" target="_blank" href="https://github.com/ItzNxthaniel/rblx-prospecting-museum-calc">Open Source</a>!</p>
    </footer>

    <div class="gem-modal-overlay" id="gem-modal" aria-hidden="true" role="dialog">
      <div class="gem-modal-content">
        <header class="gem-modal-header">
          <h2 id="gem-modal-title">EDIT PEDESTAL</h2>
          <div class="modal-buttons">
            <button type="button" class="gem-modal-button" id="gem-modal-clear-btn" aria-label="Clear form">
              <svg class="modal-button" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
                <path d="M232.7 69.9L224 96L128 96C110.3 96 96 110.3 96 128C96 145.7 110.3 160 128 160L512 160C529.7 160 544 145.7 544 128C544 110.3 529.7 96 512 96L416 96L407.3 69.9C402.9 56.8 390.7 48 376.9 48L263.1 48C249.3 48 237.1 56.8 232.7 69.9zM512 208L128 208L149.1 531.1C150.7 556.4 171.7 576 197 576L443 576C468.3 576 489.3 556.4 490.9 531.1L512 208z"/>
              </svg>
            </button>
            <button type="button" class="gem-modal-button" id="gem-modal-close-btn" aria-label="Close form">
              <svg class="modal-button" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
                <path d="M504.6 148.5C515.9 134.9 514.1 114.7 500.5 103.4C486.9 92.1 466.7 93.9 455.4 107.5L320 270L184.6 107.5C173.3 93.9 153.1 92.1 139.5 103.4C125.9 114.7 124.1 134.9 135.4 148.5L278.3 320L135.4 491.5C124.1 505.1 125.9 525.3 139.5 536.6C153.1 547.9 173.3 546.1 184.6 532.5L320 370L455.4 532.5C466.7 546.1 486.9 547.9 500.5 536.6C514.1 525.3 515.9 505.1 504.6 491.5L361.7 320L504.6 148.5z"/>
              </svg>
            </button>
          </div>
        </header>
        <div id="gem-modal-body"></div>
      </div>
    </div>

    <div class="gem-modal-overlay" id="share-modal" aria-hidden="true" role="dialog">
      <div class="gem-modal-content share-modal-width">
        <header class="gem-modal-header">
          <h2>SHARE & IMPORT MUSEUM</h2>
          <button type="button" class="gem-modal-button" id="share-modal-close-btn" aria-label="Close panel">
            <svg class="modal-button" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
              <path d="M504.6 148.5C515.9 134.9 514.1 114.7 500.5 103.4C486.9 92.1 466.7 93.9 455.4 107.5L320 270L184.6 107.5C173.3 93.9 153.1 92.1 139.5 103.4C125.9 114.7 124.1 134.9 135.4 148.5L278.3 320L135.4 491.5C124.1 505.1 125.9 525.3 139.5 536.6C153.1 547.9 173.3 546.1 184.6 532.5L320 370L455.4 532.5C466.7 546.1 486.9 547.9 500.5 536.6C514.1 525.3 515.9 505.1 504.6 491.5L361.7 320L504.6 148.5z"/>
            </svg>
          </button>
        </header>
        <div class="share-modal-body">

          <div class="share-section">
            <label for="share-code-output">Share Museum:</label>
            <div class="share-input-group">
              <input type="text" id="share-code-output" class="editor-input share-field" readonly>
              <button type="button" id="share-copy-btn" class="share-action-button">Copy</button>
            </div>
          </div>

          <hr class="share-divider" />

          <div class="share-section">
            <label for="import-code-input">Import Museum:</label>
            <div class="share-input-group">
              <input type="text" id="import-code-input" class="editor-input share-field" placeholder="Paste a museum string here...">
              <button type="button" id="share-import-btn" class="share-action-button import-theme">Import</button>
            </div>
            <p id="import-status-msg" class="import-status-text"></p>
          </div>

        </div>
      </div>
    </div>

    <div class="gem-modal-overlay" id="settings-modal" aria-hidden="true" role="dialog">
      <div class="gem-modal-content settings-modal-width">
        <header class="gem-modal-header">
          <h2>MUSEUM SETTINGS</h2>
          <button type="button" class="gem-modal-button" id="settings-modal-close-btn" aria-label="Close window">
            <svg class="modal-button" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
              <path d="M504.6 148.5C515.9 134.9 514.1 114.7 500.5 103.4C486.9 92.1 466.7 93.9 455.4 107.5L320 270L184.6 107.5C173.3 93.9 153.1 92.1 139.5 103.4C125.9 114.7 124.1 134.9 135.4 148.5L278.3 320L135.4 491.5C124.1 505.1 125.9 525.3 139.5 536.6C153.1 547.9 173.3 546.1 184.6 532.5L320 370L455.4 532.5C466.7 546.1 486.9 547.9 500.5 536.6C514.1 525.3 515.9 505.1 504.6 491.5L361.7 320L504.6 148.5z"/>
            </svg>
          </button>
        </header>
        <div class="share-modal-body">

          <div class="share-section">
            <label for="settings-name-input">Museum Name:</label>
            <input type="text" id="settings-name-input" class="editor-input" maxLength="24" placeholder="Enter room title...">
          </div>

          <div class="settings-action-row">
            <button type="button" id="settings-delete-btn" class="settings-danger-button">Delete Museum</button>
            <button type="button" id="settings-save-btn" class="settings-action-button">Save Changes</button>
          </div>

        </div>
      </div>
    </div>
  </body>
</html>
